<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>HK Bus Dashboard</title>
    <style>
        /* 匯入像素字體 */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background-color: black; /* 黑色背景 */
            color: white;
            font-family: 'Press Start 2P', monospace; /* 像素字體 */
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 頂部：時間與標題 (紅色背景) */
        .header {
            background-color: #d32f2f;
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 2px solid white;
        }

        /* 下方主體：左右分開 */
        .main-content {
            display: flex;
            height: 80%;
        }

        /* 左側：巴士資訊 (黑色背景，藍/紅字) */
        .bus-section {
            width: 50%;
            padding: 20px;
            border-right: 2px solid white;
        }

        /* 右側：天氣資訊 (藍色背景) */
        .weather-section {
            width: 50%;
            background-color: #1976d2;
            padding: 20px;
        }

        .bus-item { margin-bottom: 30px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .bus-route { color: #ffeb3b; font-size: 24px; } /* 黃色字體 */
        .bus-eta { float: right; color: #4fc3f7; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="font-size: 12px; margin-bottom: 10px;">I GO TO SCHOOL BY BUS</div>
            <div id="datetime" style="font-size: 36px;">2026/06/27 06:00 PM</div>
        </div>
    </div>

    <div class="main-content">
        <!-- 巴士模塊 -->
        <div class="bus-section" id="bus-data">
            <div class="bus-item">
                <span class="bus-route">🚌 69X</span> 
                <span class="bus-eta">6m</span>
                <div style="font-size: 10px; margin-top: 5px;">高鐵(西九龍站)</div>
            </div>
            <div class="bus-item">
                <span class="bus-route">🚌 69M</span> 
                <span class="bus-eta">6m</span>
                <div style="font-size: 10px; margin-top: 5px;">高鐵(西九龍站)</div>
            </div>
            <!-- 可以複製多個 bus-item -->
        </div>

        <!-- 天氣模塊 -->
        <div class="weather-section">
            <div style="font-size: 14px; margin-bottom: 20px;">HKO REAL-TIME SYSTEM</div>
            <div id="temperature" style="font-size: 48px; margin-bottom: 20px;">26°C ☁️</div>
            <div id="humidity">Humidity: 82%</div>
            <div id="uv-index" style="margin-top: 20px;">UV Index: 1</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
